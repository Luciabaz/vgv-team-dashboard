
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGV · Team Weather Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:    #2A48DE;
    --navy:    #0A1530;
    --white:   #FFFFFF;
    --blue20:  rgba(42,72,222,0.20);
    --blue10:  rgba(42,72,222,0.10);
    --blue06:  rgba(42,72,222,0.06);
    --w12:     rgba(255,255,255,0.12);
    --w06:     rgba(255,255,255,0.06);
    --w40:     rgba(255,255,255,0.40);
    --w70:     rgba(255,255,255,0.70);
    --warn:    #FFCC00;
    --danger:  #FC5D42;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--navy); color:var(--white); font-family:'Poppins',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 70% 50% at -10% 0%, rgba(42,72,222,0.35) 0%, transparent 55%), radial-gradient(ellipse 50% 60% at 110% 100%, rgba(42,72,222,0.20) 0%, transparent 55%), linear-gradient(160deg,#0A1530 0%,#060e22 100%); pointer-events:none; z-index:0; }
  body::after { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }

  header { position:relative; z-index:10; padding:1.75rem 3rem; display:flex; align-items:center; justify-content:space-between; gap:2rem; border-bottom:1px solid var(--w12); background:rgba(10,21,48,0.6); backdrop-filter:blur(12px); }
  .logo { display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .logo-icon { width:38px; height:38px; background:var(--blue); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
  .logo-name { font-size:0.62rem; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; color:var(--white); line-height:1; }
  .logo-sub { font-size:0.55rem; font-weight:400; color:var(--w40); letter-spacing:0.1em; text-transform:uppercase; margin-top:3px; }
  .header-center { text-align:center; }
  .header-center h1 { font-size:0.9rem; font-weight:600; letter-spacing:0.02em; }
  .live-badge { display:inline-flex; align-items:center; gap:6px; margin-top:5px; padding:3px 10px; border-radius:100px; background:var(--blue10); border:1px solid var(--blue20); font-size:0.55rem; font-weight:600; color:#89aaff; letter-spacing:0.14em; text-transform:uppercase; }
  .live-dot { width:5px; height:5px; border-radius:50%; background:#89aaff; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.65)} }
  .header-right { text-align:right; flex-shrink:0; }
  .utc-clock { font-size:1.05rem; font-weight:700; letter-spacing:0.04em; font-variant-numeric:tabular-nums; }
  .last-upd { font-size:0.55rem; font-weight:400; color:var(--w40); margin-top:4px; letter-spacing:0.07em; }

  .stats-bar { position:relative; z-index:10; padding:0.6rem 3rem; display:flex; gap:2rem; align-items:center; border-bottom:1px solid var(--w06); background:rgba(10,21,48,0.3); }
  .stat-item { font-size:0.6rem; font-weight:500; color:var(--w40); letter-spacing:0.06em; }
  .stat-item strong { color:var(--white); font-weight:700; }

  .top-nav { position:relative; z-index:10; padding:0 3rem; display:flex; align-items:center; border-bottom:1px solid var(--w12); background:rgba(10,21,48,0.5); backdrop-filter:blur(8px); }
  .top-nav-btn { background:transparent; border:none; border-bottom:2px solid transparent; color:var(--w40); font-family:'Poppins',sans-serif; font-size:0.65rem; font-weight:600; padding:0.85rem 1.25rem; cursor:pointer; letter-spacing:0.08em; text-transform:uppercase; transition:all 0.18s; }
  .top-nav-btn:hover { color:var(--white); }
  .top-nav-btn.active { color:var(--white); border-bottom-color:var(--blue); }

  .filters-bar { position:relative; z-index:10; padding:0.85rem 3rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; border-bottom:1px solid var(--w06); background:rgba(10,21,48,0.4); backdrop-filter:blur(8px); }
  .filter-label { font-size:0.58rem; font-weight:600; color:var(--w40); letter-spacing:0.15em; text-transform:uppercase; margin-right:6px; }
  .filter-btn { background:transparent; border:1px solid var(--w12); color:var(--w40); font-family:'Poppins',sans-serif; font-size:0.62rem; font-weight:500; padding:4px 13px; border-radius:100px; cursor:pointer; letter-spacing:0.04em; transition:all 0.18s; }
  .filter-btn:hover { border-color:rgba(42,72,222,0.6); color:#89aaff; background:var(--blue06); }
  .filter-btn.active { border-color:var(--blue); color:var(--white); background:var(--blue); }

  .grid-wrapper { position:relative; z-index:5; padding:0 3rem 3rem; }
  .region-header { display:flex; align-items:center; gap:14px; padding:1.75rem 0 0.85rem; }
  .rh-label { font-size:0.58rem; font-weight:600; color:var(--w40); letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }
  .rh-line { flex:1; height:1px; background:var(--w12); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(275px,1fr)); gap:1px; background:var(--w06); border:1px solid var(--w12); border-radius:12px; overflow:hidden; }
  .card { background:rgba(8,18,42,0.75); padding:1.2rem 1.35rem; transition:background 0.2s; cursor:default; }
  .card:hover { background:rgba(42,72,222,0.09); }
  .card.alert-warn { border-top:2px solid var(--warn); background:rgba(255,204,0,0.04); }
  .card.alert-danger { border-top:2px solid var(--danger); background:rgba(252,93,66,0.04); }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.9rem; }
  .city-name { font-size:0.92rem; font-weight:700; color:var(--white); line-height:1.2; display:flex; align-items:center; gap:6px; }
  .city-sub { font-size:0.53rem; font-weight:500; color:var(--w40); letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; }
  .time-block { text-align:right; }
  .local-time { font-size:1.1rem; font-weight:700; color:#89aaff; letter-spacing:0.03em; font-variant-numeric:tabular-nums; line-height:1; }
  .local-date { font-size:0.52rem; font-weight:400; color:var(--w40); margin-top:4px; letter-spacing:0.06em; }
  .weather-main { display:flex; align-items:center; gap:10px; margin-bottom:0.7rem; }
  .w-icon { font-size:2rem; line-height:1; flex-shrink:0; }
  .w-temp { font-size:1.85rem; font-weight:700; color:var(--white); letter-spacing:-0.03em; line-height:1; }
  .w-temp sup { font-size:0.8rem; font-weight:400; color:var(--w40); vertical-align:super; }
  .w-desc { font-size:0.58rem; font-weight:500; color:var(--w40); letter-spacing:0.04em; margin-top:3px; text-transform:capitalize; }
  .weather-meta { display:flex; gap:1rem; padding-top:0.6rem; border-top:1px solid var(--w06); }
  .meta-pill { display:flex; align-items:center; gap:5px; font-size:0.58rem; font-weight:500; color:var(--w40); }
  .meta-pill strong { color:var(--w70); font-weight:600; }
  .alert-tag { display:inline-flex; align-items:center; gap:5px; margin-top:0.65rem; padding:4px 10px; border-radius:6px; font-size:0.57rem; font-weight:600; letter-spacing:0.06em; }
  .alert-tag.warn { background:rgba(255,204,0,0.12); color:var(--warn); border:1px solid rgba(255,204,0,0.22); }
  .alert-tag.danger { background:rgba(252,93,66,0.12); color:var(--danger); border:1px solid rgba(252,93,66,0.22); }
  .loading-text { font-size:0.62rem; font-weight:500; color:var(--w40); letter-spacing:0.08em; animation:blink 1.3s ease-in-out infinite; }
  @keyframes blink { 50%{opacity:0.2} }

  /* ── HOLIDAYS ── */
  #holidays-view { display:none; position:relative; z-index:5; padding:2rem 3rem 3rem; }

  .month-spotlight { background:linear-gradient(135deg, rgba(42,72,222,0.18) 0%, rgba(42,72,222,0.06) 100%); border:1px solid var(--blue20); border-radius:16px; padding:1.5rem 2rem; margin-bottom:2rem; }
  .spotlight-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; }
  .spotlight-title { font-size:0.7rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#89aaff; display:flex; align-items:center; gap:8px; }
  .spotlight-month-label { font-size:1.1rem; font-weight:700; color:var(--white); }
  .spotlight-items { display:flex; flex-wrap:wrap; gap:10px; }
  .spotlight-pill { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); border:1px solid var(--w12); border-radius:10px; padding:0.6rem 1rem; min-width:200px; flex:1; }
  .spotlight-pill.is-today { background:rgba(42,72,222,0.2); border-color:var(--blue); }
  .spotlight-pill-date { text-align:center; flex-shrink:0; min-width:32px; }
  .spotlight-pill-day { font-size:1.2rem; font-weight:700; color:#89aaff; line-height:1; }
  .spotlight-pill-dow { font-size:0.48rem; font-weight:600; color:var(--w40); letter-spacing:0.1em; text-transform:uppercase; }
  .spotlight-pill-info { flex:1; }
  .spotlight-pill-name { font-size:0.68rem; font-weight:600; color:var(--white); line-height:1.2; }
  .spotlight-pill-countries { font-size:0.52rem; color:var(--w40); margin-top:3px; }
  .today-dot { width:6px; height:6px; border-radius:50%; background:#89aaff; flex-shrink:0; animation:pulse 2s ease-in-out infinite; }
  .no-holidays-month { font-size:0.65rem; color:var(--w40); text-align:center; padding:1rem 0; }

  .hol-section-header { display:flex; align-items:center; gap:14px; padding:0.5rem 0 1rem; }
  .hol-section-label { font-size:0.58rem; font-weight:600; color:var(--w40); letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }
  .hol-section-line { flex:1; height:1px; background:var(--w12); }

  .month-group { margin-bottom:0.25rem; }
  .month-group-title { font-size:0.62rem; font-weight:700; color:var(--w70); letter-spacing:0.12em; text-transform:uppercase; padding:0.9rem 0 0.4rem; display:flex; align-items:center; gap:10px; }
  .month-group-title::after { content:''; flex:1; height:1px; background:var(--w06); }

  .timeline-row { display:flex; align-items:flex-start; gap:14px; padding:0.55rem 0.75rem; border-radius:8px; transition:background 0.15s; border-left:2px solid transparent; }
  .timeline-row:hover { background:rgba(42,72,222,0.06); }
  .timeline-row.is-today { background:rgba(42,72,222,0.1); border-left-color:var(--blue); }
  .timeline-row.is-soon { border-left-color:rgba(255,204,0,0.5); }
  .timeline-row.is-past { opacity:0.4; }

  .tl-date { min-width:52px; text-align:center; flex-shrink:0; }
  .tl-day { font-size:1rem; font-weight:700; color:#89aaff; line-height:1; font-variant-numeric:tabular-nums; }
  .tl-dow { font-size:0.48rem; font-weight:600; color:var(--w40); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; }
  .tl-body { flex:1; }
  .tl-name { font-size:0.68rem; font-weight:600; color:var(--white); line-height:1.3; }
  .tl-countries { display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
  .tl-chip { display:inline-flex; align-items:center; gap:4px; font-size:0.52rem; font-weight:500; color:var(--w40); background:var(--w06); border:1px solid var(--w06); padding:2px 7px; border-radius:100px; }
  .tl-note { font-size:0.5rem; color:var(--w40); font-style:italic; margin-top:2px; }
  .tl-badge { font-size:0.5rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:2px 7px; border-radius:100px; flex-shrink:0; align-self:center; }
  .tl-badge.today { background:rgba(42,72,222,0.3); color:#89aaff; border:1px solid var(--blue20); }
  .tl-badge.soon  { background:rgba(255,204,0,0.12); color:var(--warn); border:1px solid rgba(255,204,0,0.3); }

  .hol-filters { display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; margin-bottom:1.5rem; }

  @media(max-width:768px){
    header,.stats-bar,.top-nav{padding-left:1.25rem;padding-right:1.25rem}
    .grid-wrapper,#holidays-view{padding:1.25rem 1.25rem 2rem}
    .header-center{display:none}
    .spotlight-pill{min-width:140px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🦄</div>
    <div><div class="logo-name">Very Good Ventures</div><div class="logo-sub">Team Dashboard</div></div>
  </div>
  <div class="header-center">
    <h1>Global Team · Weather &amp; Local Time</h1>
    <div class="live-badge"><span class="live-dot"></span>Live · Updates every 10 min</div>
  </div>
  <div class="header-right">
    <div class="utc-clock" id="utc-clock">00:00:00 UTC</div>
    <div class="last-upd" id="last-upd">Fetching weather data…</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item"><strong>19</strong> locations</div>
  <div class="stat-item"><strong>14</strong> countries</div>
  <div class="stat-item"><strong>100+</strong> team members</div>
  <div class="stat-item" id="alert-count" style="color:var(--warn)"></div>
</div>

<div class="top-nav">
  <button class="top-nav-btn active" id="tab-weather" onclick="switchTab('weather')">🌤 Weather &amp; Time</button>
  <button class="top-nav-btn" id="tab-holidays" onclick="switchTab('holidays')">🗓 Holidays 2026</button>
</div>

<div class="filters-bar" id="weather-filters">
  <span class="filter-label">View</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">All locations</button>
  <button class="filter-btn" onclick="setFilter('usa',this)">🇺🇸 USA</button>
  <button class="filter-btn" onclick="setFilter('latam',this)">🌎 Latin America</button>
  <button class="filter-btn" onclick="setFilter('europe',this)">🌍 Europe</button>
  <button class="filter-btn" onclick="setFilter('alerts',this)">⚠ Alerts only</button>
</div>

<div class="grid-wrapper" id="grid-wrapper">
  <div style="padding:3rem 0" class="loading-text">Loading locations…</div>
</div>

<div id="holidays-view">
  <div class="hol-filters" id="hol-filters">
    <span class="filter-label">Region</span>
    <button class="filter-btn active" onclick="setHolFilter('all',this)">All regions</button>
    <button class="filter-btn" onclick="setHolFilter('usa',this)">🇺🇸 USA</button>
    <button class="filter-btn" onclick="setHolFilter('latam',this)">🌎 Latin America</button>
    <button class="filter-btn" onclick="setHolFilter('europe',this)">🌍 Europe</button>
  </div>
  <div class="month-spotlight" id="month-spotlight"></div>
  <div class="hol-section-header">
    <span class="hol-section-label">📅 Full 2026 timeline</span>
    <span class="hol-section-line"></span>
  </div>
  <div id="hol-timeline"></div>
</div>

const COUNTRY_REGION = {USA:'usa',Brazil:'latam',Mexico:'latam',Uruguay:'latam',Ecuador:'latam',Spain:'europe',Germany:'europe',UK:'europe','Czech Republic':'europe'};
const MONTHS_FULL  = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS         = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function todayLocal(){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());}
function isToday(d){return d.getTime()===todayLocal().getTime();}
function isPast(d){return d<todayLocal();}
function isSoon(d,days=14){const diff=(d-todayLocal())/(864e5);return diff>0&&diff<=days;}

let holFilter='all';
function setHolFilter(f,btn){
  holFilter=f;
  document.querySelectorAll('#hol-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHolidays();
}

function getHolidays(){
  let list = RAW;
  if(holFilter!=='all'){
    list = list.map(h=>({
      ...h,
      c: h.c.filter(x=>COUNTRY_REGION[x.n]===holFilter)
    })).filter(h=>h.c.length>0);
  }
  return list;
}

function renderHolidays(){
  const holidays = getHolidays();
  const today = todayLocal();
  const curM = today.getMonth();
  const curY = today.getFullYear();

  // ── Spotlight: current month upcoming ──
  const thisMonth = holidays.filter(h=>{
    const d=parseD(h.d);
    return d.getMonth()===curM && d.getFullYear()===curY && !isPast(d);
  });

  let sHtml = `<div class="spotlight-header">
    <div class="spotlight-title">🗓 &nbsp;This month</div>
    <div class="spotlight-month-label">${MONTHS_FULL[curM]} ${curY}</div>
  </div>`;

  if(!thisMonth.length){
    sHtml += `<div class="no-holidays-month">No more holidays this month — enjoy! 🎉</div>`;
  } else {
    sHtml += `<div class="spotlight-items">`;
    thisMonth.forEach(h=>{
      const d=parseD(h.d); const td=isToday(d);
      sHtml+=`<div class="spotlight-pill${td?' is-today':''}">
        <div class="spotlight-pill-date"><div class="spotlight-pill-day">${d.getDate()}</div><div class="spotlight-pill-dow">${DAYS[d.getDay()]}</div></div>
        <div class="spotlight-pill-info">
          <div class="spotlight-pill-name">${h.n}</div>
          <div class="spotlight-pill-countries">${h.c.map(x=>`${x.f} ${x.n}`).join(' · ')}</div>
          ${h.note?`<div class="spotlight-pill-countries" style="font-style:italic">📍 ${h.note}</div>`:''}
        </div>
        ${td?'<div class="today-dot"></div>':''}
      </div>`;
    });
    sHtml+=`</div>`;
  }
  document.getElementById('month-spotlight').innerHTML = sHtml;

  // ── Timeline grouped by month ──
  const byMonth = {};
  holidays.forEach(h=>{
    const d=parseD(h.d);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byMonth[key]) byMonth[key]=[];
    byMonth[key].push(h);
  });

  let tlHtml='';
  Object.entries(byMonth).forEach(([key,items])=>{
    const[y,m]=key.split('-').map(Number);
    const isCur=(m-1===curM && y===curY);
    tlHtml+=`<div class="month-group">
      <div class="month-group-title">${MONTHS_FULL[m-1]} ${y}${isCur?' &nbsp;<span style="color:#89aaff;font-size:0.58rem;text-transform:none;letter-spacing:0">← now</span>':''}</div>`;
    items.forEach(h=>{
      const d=parseD(h.d);
      const past=isPast(d); const td=isToday(d); const soon=isSoon(d);
      let cls=td?'is-today':soon?'is-soon':past?'is-past':'';
      let badge=td?`<span class="tl-badge today">TODAY</span>`:soon?`<span class="tl-badge soon">SOON</span>`:'';
      const endStr=h.dateEnd?` – ${parseD(h.dateEnd).getDate()} ${MONTHS_SHORT[parseD(h.dateEnd).getMonth()]}` : '';
      tlHtml+=`<div class="timeline-row ${cls}">
        <div class="tl-date"><div class="tl-day">${d.getDate()}</div><div class="tl-dow">${DAYS[d.getDay()]}</div></div>
        <div class="tl-body">
          <div class="tl-name">${h.n}${endStr?`<span style="font-size:0.55rem;color:var(--w40);font-weight:400"> ${endStr}</span>`:''}</div>
          <div class="tl-countries">${h.c.map(x=>`<span class="tl-chip">${x.f} ${x.n}</span>`).join('')}</div>
          ${h.note?`<div class="tl-note">📍 ${h.note}</div>`:''}
        </div>
        ${badge}
      </div>`;
    });
    tlHtml+=`</div>`;
  });
  document.getElementById('hol-timeline').innerHTML=tlHtml;
}

// ── TAB SWITCHING ──
function switchTab(tab){
  const wEl=document.getElementById('grid-wrapper');
  const wF=document.getElementById('weather-filters');
  const hEl=document.getElementById('holidays-view');
  if(tab==='weather'){
    wEl.style.display=''; wF.style.display=''; hEl.style.display='none';
    document.getElementById('tab-weather').classList.add('active');
    document.getElementById('tab-holidays').classList.remove('active');
  } else {
    wEl.style.display='none'; wF.style.display='none'; hEl.style.display='block';
    document.getElementById('tab-weather').classList.remove('active');
    document.getElementById('tab-holidays').classList.add('active');
    renderHolidays();
  }
}

const LOCATIONS=[

];
const WMO={0:["☀️","Clear sky"],1:["🌤","Mainly clear"],2:["⛅","Partly cloudy"],3:["☁️","Overcast"],45:["🌫","Foggy"],48:["🌫","Icy fog"],51:["🌦","Light drizzle"],53:["🌦","Drizzle"],55:["🌧","Heavy drizzle"],61:["🌧","Light rain"],63:["🌧","Rain"],65:["🌧","Heavy rain"],71:["🌨","Light snow"],73:["❄️","Snow"],75:["❄️","Heavy snow"],77:["🌨","Snow grains"],80:["🌦","Showers"],81:["🌧","Heavy showers"],82:["⛈","Violent showers"],85:["🌨","Snow showers"],86:["❄️","Heavy snow showers"],95:["⛈","Thunderstorm"],96:["⛈","Hail storm"],99:["⛈","Heavy hail"]};
function getAlert(c,w,t){if(c>=95)return{level:"danger",msg:"⚡ Thunderstorm warning"};if((c>=71&&c<=77)||c===85||c===86)return{level:"warn",msg:"❄️ Snow conditions"};if(w>55)return{level:"danger",msg:"💨 High wind warning"};if(w>38)return{level:"warn",msg:"💨 Strong winds"};if(t>38)return{level:"danger",msg:"🔥 Extreme heat"};if(t>32)return{level:"warn",msg:"☀️ Heat advisory"};if(t<-12)return{level:"danger",msg:"🥶 Extreme cold"};if(t<0)return{level:"warn",msg:"🧊 Freezing conditions"};if(c>=61&&c<=67)return{level:"warn",msg:"🌧 Heavy rain"};return null;}
function getTime(tz){const n=new Date();return{time:n.toLocaleTimeString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false}),date:n.toLocaleDateString('en-US',{timeZone:tz,weekday:'short',month:'short',day:'numeric'})};}
async function fetchW(lat,lon){const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&wind_speed_unit=kmh`);return(await r.json()).current;}
const cache={};let activeFilter='all';
function ckey(l){return l.city+(l.state||'');}
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('#weather-filters .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
const REGIONS={usa:{label:'🇺🇸  United States'},latam:{label:'🌎  Latin America'},europe:{label:'🌍  Europe'}};
function cardHTML(loc){
  const k=ckey(loc);const t=getTime(loc.tz);const w=cache[k];
  const cl=loc.city+(loc.state?', '+loc.state:'');const sl=loc.country+(loc.team?' · '+loc.team+' member'+(loc.team!==1?'s':''):'');
  if(!w)return`<div class="card"><div class="card-top"><div><div class="city-name"><span>${loc.flag}</span>${cl}</div><div class="city-sub">${sl}</div></div><div class="time-block"><div class="local-time">${t.time}</div><div class="local-date">${t.date}</div></div></div><div class="loading-text">fetching weather…</div></div>`;
  const[icon,desc]=WMO[w.weathercode]||["🌡","Unknown"];
  const alert=getAlert(w.weathercode,w.windspeed_10m,w.temperature_2m);
  const tC=Math.round(w.temperature_2m);const tF=Math.round(w.temperature_2m*9/5+32);const wi=Math.round(w.windspeed_10m);
  return`<div class="card${alert?' alert-'+alert.level:''}"><div class="card-top"><div><div class="city-name"><span>${loc.flag}</span>${cl}</div><div class="city-sub">${sl}</div></div><div class="time-block"><div class="local-time">${t.time}</div><div class="local-date">${t.date}</div></div></div><div class="weather-main"><div class="w-icon">${icon}</div><div><div class="w-temp">${tC}<sup>°C</sup> <span style="font-size:1rem;font-weight:500;color:var(--w40);">/ ${tF}°F</span></div><div class="w-desc">${desc}</div></div></div><div class="weather-meta"><div class="meta-pill">💨 <strong>${wi} km/h</strong></div><div class="meta-pill">💧 <strong>${w.relativehumidity_2m}%</strong></div></div>${alert?`<div class="alert-tag ${alert.level}">${alert.msg}</div>`:''}</div>`;
}
function render(){
  const wrapper=document.getElementById('grid-wrapper');let locs=[...LOCATIONS];
  if(activeFilter==='usa')locs=locs.filter(l=>l.region==='usa');
  else if(activeFilter==='latam')locs=locs.filter(l=>l.region==='latam');
  else if(activeFilter==='europe')locs=locs.filter(l=>l.region==='europe');
  else if(activeFilter==='alerts')locs=locs.filter(l=>{const w=cache[ckey(l)];return w&&getAlert(w.weathercode,w.windspeed_10m,w.temperature_2m);});
  if(!locs.length){wrapper.innerHTML=`<div style="padding:3rem 0" class="loading-text">No alerts right now — all clear ✓</div>`;return;}
  const groups={};locs.forEach(l=>{if(!groups[l.region])groups[l.region]=[];groups[l.region].push(l);});
  const keys=Object.keys(REGIONS).filter(r=>groups[r]);const sh=keys.length>1;
  let html='';keys.forEach(rk=>{const g=groups[rk];if(!g)return;if(sh)html+=`<div class="region-header"><span class="rh-label">${REGIONS[rk].label}</span><span class="rh-line"></span></div>`;html+=`<div class="grid">${g.map(cardHTML).join('')}</div>`;});
  wrapper.innerHTML=html;
  const ac=LOCATIONS.filter(l=>{const w=cache[ckey(l)];return w&&getAlert(w.weathercode,w.windspeed_10m,w.temperature_2m);}).length;
  const el=document.getElementById('alert-count');
  if(ac>0)el.innerHTML=`<strong>${ac}</strong> active alert${ac!==1?'s':''}`;else el.innerHTML='';
}
function tickClock(){const n=new Date();document.getElementById('utc-clock').textContent=n.toLocaleTimeString('en-US',{timeZone:'UTC',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})+' UTC';}
async function loadWeather(){
  document.getElementById('last-upd').textContent='Updating…';
  await Promise.all(LOCATIONS.map(async loc=>{try{cache[ckey(loc)]=await fetchW(loc.lat,loc.lon);}catch(e){}}));
  const n=new Date();document.getElementById('last-upd').textContent='Updated '+n.toLocaleTimeString('en-US',{timeZone:'UTC',hour:'2-digit',minute:'2-digit',hour12:false})+' UTC';render();
}
loadWeather();setInterval(render,1000);setInterval(tickClock,1000);setInterval(loadWeather,10*60*1000);tickClock();
</script>
