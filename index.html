<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGV · Team Weather Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:    #2A48DE;
    --navy:    #0A1530;
    --white:   #FFFFFF;
    --blue20:  rgba(42,72,222,0.20);
    --blue10:  rgba(42,72,222,0.10);
    --blue06:  rgba(42,72,222,0.06);
    --w12:     rgba(255,255,255,0.12);
    --w06:     rgba(255,255,255,0.06);
    --w40:     rgba(255,255,255,0.40);
    --w70:     rgba(255,255,255,0.70);
    --warn:    #FFCC00;
    --danger:  #FC5D42;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 70% 50% at -10% 0%,  rgba(42,72,222,0.35) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 110% 100%, rgba(42,72,222,0.20) 0%, transparent 55%),
      linear-gradient(160deg,#0A1530 0%,#060e22 100%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size:48px 48px;
    pointer-events:none; z-index:0;
  }

  /* ── Header ── */
  header {
    position:relative; z-index:10;
    padding:1.75rem 3rem;
    display:flex; align-items:center; justify-content:space-between; gap:2rem;
    border-bottom:1px solid var(--w12);
    background:rgba(10,21,48,0.6);
    backdrop-filter:blur(12px);
  }
  .logo { display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .logo-icon {
    width:38px; height:38px;
    background:var(--blue); border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem; flex-shrink:0;
  }
  .logo-name {
    font-size:0.62rem; font-weight:700;
    letter-spacing:0.25em; text-transform:uppercase; color:var(--white); line-height:1;
  }
  .logo-sub {
    font-size:0.55rem; font-weight:400;
    color:var(--w40); letter-spacing:0.1em; text-transform:uppercase; margin-top:3px;
  }
  .header-center { text-align:center; }
  .header-center h1 { font-size:0.9rem; font-weight:600; letter-spacing:0.02em; }
  .live-badge {
    display:inline-flex; align-items:center; gap:6px;
    margin-top:5px; padding:3px 10px; border-radius:100px;
    background:var(--blue10); border:1px solid var(--blue20);
    font-size:0.55rem; font-weight:600; color:#89aaff;
    letter-spacing:0.14em; text-transform:uppercase;
  }
  .live-dot {
    width:5px; height:5px; border-radius:50%; background:#89aaff;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.65)} }
  .header-right { text-align:right; flex-shrink:0; }
  .utc-clock {
    font-size:1.05rem; font-weight:700; letter-spacing:0.04em;
    font-variant-numeric:tabular-nums;
  }
  .last-upd { font-size:0.55rem; font-weight:400; color:var(--w40); margin-top:4px; letter-spacing:0.07em; }

  /* ── Stats bar ── */
  .stats-bar {
    position:relative; z-index:10;
    padding:0.6rem 3rem;
    display:flex; gap:2rem; align-items:center;
    border-bottom:1px solid var(--w06);
    background:rgba(10,21,48,0.3);
  }
  .stat-item { font-size:0.6rem; font-weight:500; color:var(--w40); letter-spacing:0.06em; }
  .stat-item strong { color:var(--white); font-weight:700; }

  /* ── Filters ── */
  .filters-bar {
    position:relative; z-index:10;
    padding:0.85rem 3rem;
    display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap;
    border-bottom:1px solid var(--w06);
    background:rgba(10,21,48,0.4);
    backdrop-filter:blur(8px);
  }
  .filter-label {
    font-size:0.58rem; font-weight:600; color:var(--w40);
    letter-spacing:0.15em; text-transform:uppercase; margin-right:6px;
  }
  .filter-btn {
    background:transparent; border:1px solid var(--w12); color:var(--w40);
    font-family:'Poppins',sans-serif; font-size:0.62rem; font-weight:500;
    padding:4px 13px; border-radius:100px; cursor:pointer;
    letter-spacing:0.04em; transition:all 0.18s;
  }
  .filter-btn:hover { border-color:rgba(42,72,222,0.6); color:#89aaff; background:var(--blue06); }
  .filter-btn.active { border-color:var(--blue); color:var(--white); background:var(--blue); }

  /* ── Grid ── */
  .grid-wrapper { position:relative; z-index:5; padding:0 3rem 3rem; }
  .region-header {
    display:flex; align-items:center; gap:14px;
    padding:1.75rem 0 0.85rem;
  }
  .rh-label { font-size:0.58rem; font-weight:600; color:var(--w40); letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }
  .rh-line { flex:1; height:1px; background:var(--w12); }
  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(275px,1fr));
    gap:1px; background:var(--w06);
    border:1px solid var(--w12); border-radius:12px; overflow:hidden;
  }

  /* ── Cards ── */
  .card {
    background:rgba(8,18,42,0.75);
    padding:1.2rem 1.35rem;
    transition:background 0.2s; cursor:default;
  }
  .card:hover { background:rgba(42,72,222,0.09); }
  .card.alert-warn   { border-top:2px solid var(--warn);   background:rgba(255,204,0,0.04); }
  .card.alert-danger { border-top:2px solid var(--danger); background:rgba(252,93,66,0.04); }

  .card-top {
    display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.9rem;
  }
  .city-name {
    font-size:0.92rem; font-weight:700; color:var(--white);
    line-height:1.2; display:flex; align-items:center; gap:6px;
  }
  .city-sub { font-size:0.53rem; font-weight:500; color:var(--w40); letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; }

  .time-block { text-align:right; }
  .local-time { font-size:1.1rem; font-weight:700; color:#89aaff; letter-spacing:0.03em; font-variant-numeric:tabular-nums; line-height:1; }
  .local-date { font-size:0.52rem; font-weight:400; color:var(--w40); margin-top:4px; letter-spacing:0.06em; }

  .weather-main { display:flex; align-items:center; gap:10px; margin-bottom:0.7rem; }
  .w-icon { font-size:2rem; line-height:1; flex-shrink:0; }
  .w-temp { font-size:1.85rem; font-weight:700; color:var(--white); letter-spacing:-0.03em; line-height:1; }
  .w-temp sup { font-size:0.8rem; font-weight:400; color:var(--w40); vertical-align:super; }
  .w-desc { font-size:0.58rem; font-weight:500; color:var(--w40); letter-spacing:0.04em; margin-top:3px; text-transform:capitalize; }

  .weather-meta { display:flex; gap:1rem; padding-top:0.6rem; border-top:1px solid var(--w06); }
  .meta-pill { display:flex; align-items:center; gap:5px; font-size:0.58rem; font-weight:500; color:var(--w40); }
  .meta-pill strong { color:var(--w70); font-weight:600; }

  .alert-tag {
    display:inline-flex; align-items:center; gap:5px;
    margin-top:0.65rem; padding:4px 10px; border-radius:6px;
    font-size:0.57rem; font-weight:600; letter-spacing:0.06em;
  }
  .alert-tag.warn   { background:rgba(255,204,0,0.12);  color:var(--warn);   border:1px solid rgba(255,204,0,0.22); }
  .alert-tag.danger { background:rgba(252,93,66,0.12); color:var(--danger); border:1px solid rgba(252,93,66,0.22); }

  .loading-text { font-size:0.62rem; font-weight:500; color:var(--w40); letter-spacing:0.08em; animation:blink 1.3s ease-in-out infinite; }
  @keyframes blink { 50%{opacity:0.2} }

  @media(max-width:768px){
    header,.filters-bar,.stats-bar{padding-left:1.25rem;padding-right:1.25rem}
    .grid-wrapper{padding:0 1.25rem 2rem}
    .header-center{display:none}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🦄</div>
    <div>
      <div class="logo-name">Very Good Ventures</div>
      <div class="logo-sub">Team Dashboard</div>
    </div>
  </div>
  <div class="header-center">
    <h1>Global Team · Weather &amp; Local Time</h1>
    <div class="live-badge"><span class="live-dot"></span>Live · Updates every 10 min</div>
  </div>
  <div class="header-right">
    <div class="utc-clock" id="utc-clock">00:00:00 UTC</div>
    <div class="last-upd" id="last-upd">Fetching weather data…</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item"><strong>19</strong> locations</div>
  <div class="stat-item"><strong>14</strong> countries</div>
  <div class="stat-item"><strong>100+</strong> team members</div>
  <div class="stat-item" id="alert-count" style="color:var(--warn)"></div>
</div>

<div class="filters-bar">
  <span class="filter-label">View</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">All locations</button>
  <button class="filter-btn" onclick="setFilter('usa',this)">🇺🇸 USA</button>
  <button class="filter-btn" onclick="setFilter('latam',this)">🌎 Latin America</button>
  <button class="filter-btn" onclick="setFilter('europe',this)">🌍 Europe</button>
  <button class="filter-btn" onclick="setFilter('alerts',this)">⚠ Alerts only</button>
</div>

<div class="grid-wrapper" id="grid-wrapper">
  <div style="padding:3rem 0" class="loading-text">Loading locations…</div>
</div>

<script>
// ── Locations sourced from Notion "Employees by Country" DB ──
// Each country mapped to its primary city + coordinates
const LOCATIONS = [
  // USA — multiple cities per request
  { city:"New York",    state:"NY", country:"USA",            tz:"America/New_York",                       lat:40.71,  lon:-74.01,  region:"usa",   flag:"🇺🇸", team:20 },
  { city:"Chicago",     state:"IL", country:"USA",            tz:"America/Chicago",                        lat:41.88,  lon:-87.63,  region:"usa",   flag:"🇺🇸", team:3  },
  { city:"Houston",     state:"TX", country:"USA",            tz:"America/Chicago",                        lat:29.76,  lon:-95.37,  region:"usa",   flag:"🇺🇸", team:3  },
  { city:"Los Angeles", state:"CA", country:"USA",            tz:"America/Los_Angeles",                    lat:34.05,  lon:-118.24, region:"usa",   flag:"🇺🇸", team:3  },
  { city:"Hartford",    state:"CT", country:"USA",            tz:"America/New_York",                       lat:41.76,  lon:-72.68,  region:"usa",   flag:"🇺🇸", team:2  },
  { city:"Newark",      state:"NJ", country:"USA",            tz:"America/New_York",                       lat:40.73,  lon:-74.17,  region:"usa",   flag:"🇺🇸", team:2  },
  // Latin America — one city per country from Notion DB
  { city:"Montevideo",             country:"Uruguay",         tz:"America/Montevideo",                     lat:-34.90, lon:-56.19,  region:"latam", flag:"🇺🇾", team:20 },
  { city:"São Paulo",              country:"Brazil",          tz:"America/Sao_Paulo",                      lat:-23.55, lon:-46.63,  region:"latam", flag:"🇧🇷", team:16 },
  { city:"Buenos Aires",           country:"Argentina",       tz:"America/Argentina/Buenos_Aires",         lat:-34.60, lon:-58.38,  region:"latam", flag:"🇦🇷", team:5  },
  { city:"Mexico City",            country:"Mexico",          tz:"America/Mexico_City",                    lat:19.43,  lon:-99.13,  region:"latam", flag:"🇲🇽", team:3  },
  { city:"Lima",                   country:"Peru",            tz:"America/Lima",                           lat:-12.05, lon:-77.04,  region:"latam", flag:"🇵🇪", team:2  },
  { city:"Guayaquil",              country:"Ecuador",         tz:"America/Guayaquil",                      lat:-2.19,  lon:-79.89,  region:"latam", flag:"🇪🇨", team:1  },
  { city:"San Salvador",           country:"El Salvador",     tz:"America/El_Salvador",                    lat:13.69,  lon:-89.19,  region:"latam", flag:"🇸🇻", team:1  },
  // Europe — one city per country from Notion DB
  { city:"Madrid",                 country:"Spain",           tz:"Europe/Madrid",                          lat:40.42,  lon:-3.70,   region:"europe",flag:"🇪🇸", team:11 },
  { city:"Berlin",                 country:"Germany",         tz:"Europe/Berlin",                          lat:52.52,  lon:13.40,   region:"europe",flag:"🇩🇪", team:2  },
  { city:"Warsaw",                 country:"Poland",          tz:"Europe/Warsaw",                          lat:52.23,  lon:21.01,   region:"europe",flag:"🇵🇱", team:1  },
  { city:"Prague",                 country:"Czech Republic",  tz:"Europe/Prague",                          lat:50.08,  lon:14.44,   region:"europe",flag:"🇨🇿", team:1  },
  { city:"London",                 country:"UK",              tz:"Europe/London",                          lat:51.51,  lon:-0.13,   region:"europe",flag:"🇬🇧", team:1  },
  { city:"Stockholm",              country:"Sweden",          tz:"Europe/Stockholm",                       lat:59.33,  lon:18.07,   region:"europe",flag:"🇸🇪", team:1  },
];

const WMO = {
  0:["☀️","Clear sky"],   1:["🌤","Mainly clear"],  2:["⛅","Partly cloudy"], 3:["☁️","Overcast"],
  45:["🌫","Foggy"],      48:["🌫","Icy fog"],
  51:["🌦","Light drizzle"],53:["🌦","Drizzle"],    55:["🌧","Heavy drizzle"],
  61:["🌧","Light rain"], 63:["🌧","Rain"],          65:["🌧","Heavy rain"],
  71:["🌨","Light snow"], 73:["❄️","Snow"],           75:["❄️","Heavy snow"],   77:["🌨","Snow grains"],
  80:["🌦","Showers"],    81:["🌧","Heavy showers"], 82:["⛈","Violent showers"],
  85:["🌨","Snow showers"],86:["❄️","Heavy snow showers"],
  95:["⛈","Thunderstorm"],96:["⛈","Hail storm"],   99:["⛈","Heavy hail"],
};

function getAlert(code, wind, temp) {
  if (code >= 95)                           return {level:"danger", msg:"⚡ Thunderstorm warning"};
  if ((code>=71&&code<=77)||code===85||code===86) return {level:"warn",   msg:"❄️ Snow conditions"};
  if (wind > 55)                            return {level:"danger", msg:"💨 High wind warning"};
  if (wind > 38)                            return {level:"warn",   msg:"💨 Strong winds"};
  if (temp > 38)                            return {level:"danger", msg:"🔥 Extreme heat"};
  if (temp > 32)                            return {level:"warn",   msg:"☀️ Heat advisory"};
  if (temp < -12)                           return {level:"danger", msg:"🥶 Extreme cold"};
  if (temp < 0)                             return {level:"warn",   msg:"🧊 Freezing conditions"};
  if (code>=61&&code<=67)                   return {level:"warn",   msg:"🌧 Heavy rain"};
  return null;
}

function getTime(tz) {
  const now = new Date();
  return {
    time: now.toLocaleTimeString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false}),
    date: now.toLocaleDateString('en-US',{timeZone:tz,weekday:'short',month:'short',day:'numeric'})
  };
}

async function fetchW(lat,lon) {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&wind_speed_unit=kmh`);
  return (await r.json()).current;
}

const cache = {};
let activeFilter = 'all';
function ckey(l){ return l.city+(l.state||''); }

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

const REGIONS = {
  usa:   {label:'🇺🇸  United States', order:0},
  latam: {label:'🌎  Latin America',  order:1},
  europe:{label:'🌍  Europe',         order:2},
};

function cardHTML(loc) {
  const k = ckey(loc);
  const t = getTime(loc.tz);
  const w = cache[k];
  const cityLabel = loc.city+(loc.state?', '+loc.state:'');
  const subLabel  = loc.country+(loc.team?' · '+loc.team+' member'+(loc.team!==1?'s':''):'');

  if(!w) return `<div class="card">
    <div class="card-top">
      <div><div class="city-name"><span>${loc.flag}</span>${cityLabel}</div><div class="city-sub">${subLabel}</div></div>
      <div class="time-block"><div class="local-time">${t.time}</div><div class="local-date">${t.date}</div></div>
    </div>
    <div class="loading-text">fetching weather…</div>
  </div>`;

  const [icon,desc] = WMO[w.weathercode]||["🌡","Unknown"];
  const alert = getAlert(w.weathercode, w.windspeed_10m, w.temperature_2m);
  const temp  = Math.round(w.temperature_2m);
  const wind  = Math.round(w.windspeed_10m);

  return `<div class="card${alert?' alert-'+alert.level:''}">
    <div class="card-top">
      <div><div class="city-name"><span>${loc.flag}</span>${cityLabel}</div><div class="city-sub">${subLabel}</div></div>
      <div class="time-block"><div class="local-time">${t.time}</div><div class="local-date">${t.date}</div></div>
    </div>
    <div class="weather-main">
      <div class="w-icon">${icon}</div>
      <div><div class="w-temp">${temp}<sup>°C</sup></div><div class="w-desc">${desc}</div></div>
    </div>
    <div class="weather-meta">
      <div class="meta-pill">💨 <strong>${wind} km/h</strong></div>
      <div class="meta-pill">💧 <strong>${w.relativehumidity_2m}%</strong></div>
    </div>
    ${alert?`<div class="alert-tag ${alert.level}">${alert.msg}</div>`:''}
  </div>`;
}

function render() {
  const wrapper = document.getElementById('grid-wrapper');
  let locs = [...LOCATIONS];

  if      (activeFilter==='usa')    locs = locs.filter(l=>l.region==='usa');
  else if (activeFilter==='latam')  locs = locs.filter(l=>l.region==='latam');
  else if (activeFilter==='europe') locs = locs.filter(l=>l.region==='europe');
  else if (activeFilter==='alerts') locs = locs.filter(l=>{
    const w=cache[ckey(l)];
    return w && getAlert(w.weathercode,w.windspeed_10m,w.temperature_2m);
  });

  if(locs.length===0){
    wrapper.innerHTML=`<div style="padding:3rem 0" class="loading-text">No alerts right now — all clear ✓</div>`;
    return;
  }

  // Group by region
  const groups = {};
  locs.forEach(l=>{if(!groups[l.region])groups[l.region]=[];groups[l.region].push(l);});
  const regionKeys = Object.keys(REGIONS).filter(r=>groups[r]);
  const showHeaders = regionKeys.length > 1;

  let html='';
  regionKeys.forEach(rk=>{
    const grp=groups[rk]; if(!grp) return;
    if(showHeaders) html+=`<div class="region-header"><span class="rh-label">${REGIONS[rk].label}</span><span class="rh-line"></span></div>`;
    html+=`<div class="grid">${grp.map(cardHTML).join('')}</div>`;
  });
  wrapper.innerHTML=html;

  // Update alert counter
  const alertCount = LOCATIONS.filter(l=>{
    const w=cache[ckey(l)];
    return w && getAlert(w.weathercode,w.windspeed_10m,w.temperature_2m);
  }).length;
  const el = document.getElementById('alert-count');
  if(alertCount>0) el.innerHTML=`<strong>${alertCount}</strong> active alert${alertCount!==1?'s':''}`;
  else el.innerHTML='';
}

function tickClock(){
  const now=new Date();
  document.getElementById('utc-clock').textContent=
    now.toLocaleTimeString('en-US',{timeZone:'UTC',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})+' UTC';
}

async function loadWeather(){
  document.getElementById('last-upd').textContent='Updating…';
  await Promise.all(LOCATIONS.map(async loc=>{
    try{ cache[ckey(loc)]=await fetchW(loc.lat,loc.lon); }
    catch(e){ console.warn('Failed:',loc.city); }
  }));
  const now=new Date();
  document.getElementById('last-upd').textContent=
    'Updated '+now.toLocaleTimeString('en-US',{timeZone:'UTC',hour:'2-digit',minute:'2-digit',hour12:false})+' UTC';
  render();
}

loadWeather();
setInterval(render,1000);
setInterval(tickClock,1000);
setInterval(loadWeather,10*60*1000);
tickClock();
</script>
</body>
</html>
